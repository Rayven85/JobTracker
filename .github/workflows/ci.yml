name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-server:
    name: Server tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: jobtracker_test
          POSTGRES_USER: jobtracker
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci

      # Prisma 7 has no postinstall auto-generate — without this, every suite fails at
      # import with "Cannot find module '.prisma/client'".
      - name: Generate Prisma client
        run: cd server && npx prisma generate
        env:
          DATABASE_URL: postgresql://jobtracker:password@localhost:5432/jobtracker_test

      - name: Run Prisma migrations
        run: cd server && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://jobtracker:password@localhost:5432/jobtracker_test

      - name: Run server tests
        run: cd server && npx jest --coverage --runInBand --forceExit
        # No real secrets needed: the Groq SDK is mocked in tests, S3 presigning is a local
        # signature computation, and JWT/OAuth setup only checks that values are non-empty.
        # Hardcoded dummies keep CI hermetic — only Postgres is a real service.
        env:
          DATABASE_URL: postgresql://jobtracker:password@localhost:5432/jobtracker_test
          DATABASE_TEST_URL: postgresql://jobtracker:password@localhost:5432/jobtracker_test
          JWT_ACCESS_SECRET: ci-test-access-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
          GROQ_API_KEY: ci-dummy-key
          AWS_REGION: ap-southeast-2
          AWS_ACCESS_KEY_ID: ci-dummy-key-id
          AWS_SECRET_ACCESS_KEY: ci-dummy-secret
          S3_BUCKET_NAME: jobtracker-resumes-test
          GOOGLE_CLIENT_ID: ci-dummy-client-id
          GOOGLE_CLIENT_SECRET: ci-dummy-client-secret
          CLIENT_URL: http://localhost:3000
          SERVER_URL: http://localhost:4000
          NODE_ENV: test

  test-client:
    name: Client tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Run client tests
        run: cd client && npx jest --coverage

  build:
    name: Build check
    runs-on: ubuntu-latest
    needs: [test-server, test-client]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        run: cd server && npm ci

      # generate never connects to the DB; prisma.config.ts just needs a non-null URL
      # (same trick as server/Dockerfile.prod).
      - name: Generate Prisma client
        run: cd server && DATABASE_URL="postgresql://x:x@localhost:5432/x" npx prisma generate

      - name: TypeScript check (server)
        run: cd server && npx tsc --noEmit

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Build client
        run: cd client && npm run build
